<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- META TAGS -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description"
        content="Navbar adaptativa para dispositivos móveis e desktops, desenvolvida como componente reutilizável para projetos web.">

    <meta name="keywords" content="navbar, responsiva, menu mobile, componente web, HTML5, CSS3, JavaScript">

    <meta name="author" content="Rodrigo Dias">

    <!-- TÍTULO -->
    <title>Adaptive Navbar</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="../assets/icon/favicon.ico">

</head>

<body>

    <!-- HEADER PRINCIPAL -->
<header class="main-header">

    <!-- WRAPPER -->
    <div class="wrapper">

        <!-- NAVBAR -->
        <nav class="navbar">

            <!-- LOGO -->
            <a href="#" class="navbar-logo">

                <img
                    src="../assets/media/logo-navbar.jpg"
                    alt="Logo do projeto Adaptive Navbar"
                >

            </a>

            <!-- MENU DESKTOP -->
            <ul class="navbar-menu">

                <li class="navbar-item">
                    <a href="#" class="navbar-link active">
                        Home
                    </a>
                </li>

                <li class="navbar-item">
                    <a href="#" class="navbar-link">
                        Sobre
                    </a>
                </li>

                <li class="navbar-item">
                    <a href="#" class="navbar-link">
                        Serviços
                    </a>
                </li>

                <li class="navbar-item">
                    <a href="#" class="navbar-link">
                        Contato
                    </a>
                </li>

            </ul>

            <!-- BOTÃO MENU MOBILE -->
            <button
                class="navbar-toggle"
                type="button"
                aria-label="Abrir menu"
            >

                <span class="toggle-bar"></span>
                <span class="toggle-bar"></span>
                <span class="toggle-bar"></span>

            </button>

        </nav>

    </div>

</header>

    <!-- JAVASCRIPT -->
    <script src="js/script.js"></script>

</body>

</html>
